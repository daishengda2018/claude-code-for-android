# 规则优先级配置
# Version: 1.0.0
#
# 定义项目规则与全局规则的优先级策略，解决规则冲突问题

# ============================================================================
# 优先级策略
# ============================================================================
priority_strategy:
  # 全局核心规则列表（项目规则不可覆盖）
  global_core_rules:
    - "SEC-*"           # 所有安全规则
    - "ARCH-001"        # ViewModel Context泄漏
    - "ARCH-003"        # Repository层缺失
    - "PERF-001"        # 主线程IO

  # 项目规则策略
  project_rule_strategy: "append"  # append | override
  # append - 项目规则追加到全局规则后
  # override - 项目规则覆盖全局规则（仅非核心规则）

  # 冲突解决策略
  conflict_resolve: "global_first"  # global_first | project_first
  # global_first - 全局规则优先
  # project_first - 项目规则优先（仅非核心规则）

# ============================================================================
# 项目规则示例
# ============================================================================
project_rules:
  # 示例：某个项目对命名规范有特殊要求
  custom-naming-project:
    overrides:
      - rule_id: PRAC-001
        severity: P3  # 降低到P3
        confidence_threshold: 0.9  # 提高置信度阈值
        custom_patterns:
          - regex: "m[A-Z][a-zA-Z0-9]*"  # Android成员变量前缀
            allowed: true

  # 示例：某个项目启用更严格的性能检查
  performance-critical-project:
    overrides:
      - rule_id: PERF-001
        severity: P1  # 提升到P1
        confidence_threshold: 0.7  # 降低置信度阈值

  # 示例：某个项目禁用某些规则
  legacy-project:
    disabled_rules:
      - QUAL-006  # 调试代码检查
      - PRAC-001  # 命名规范
      - QUAL-007  # 测试覆盖
