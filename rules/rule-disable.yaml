# 规则热禁用配置
# Version: 1.0.0
#
# 此文件用于运行时禁用特定规则，无需修改主元数据文件
# 适用于：临时调试、项目定制、误报反馈后的临时禁用

# ============================================================================
# 全局禁用规则列表
# ============================================================================
disabled_rules:
  # 示例：临时禁用某条规则
  # - rule_id: PRAC-001
  #   reason: "项目遗留代码，暂不整改"
  #   disabled_until: "2025-03-31"
  #   disabled_by: "team-lead"

  # - rule_id: QUAL-007
  #   reason: "测试覆盖率正在逐步提升中"
  #   disabled_until: null  # null 表示永久禁用直到手动启用

# ============================================================================
# 按项目禁用规则
# ============================================================================
project_specific_disables:
  example-project:
    disabled_rules:
      - rule_id: PRAC-001
        reason: "项目使用特殊命名规范"
    disabled_until: null

# ============================================================================
# 按严重级别禁用（轻量模式）
# ============================================================================
severity_based_disables:
  lightweight_mode:
    # 轻量模式下仅保留核心规则
    disabled_categories:
      - PRAC  # 禁用所有最佳实践规则
    disabled_rules:
      - QUAL-006  # 禁用调试代码检查
      - QUAL-007  # 禁用测试覆盖检查
